<style>
:root {
  --bg: #f5f7fb; --ink: #172033; --muted: #667085; --line: #d7deea;
  --panel: #ffffff; --accent: #1f6feb; --accent-dark: #174ea6;
  --danger: #d33f49; --shadow: 0 4px 24px rgba(22,32,51,0.08);
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--ink); font-family: "Segoe UI","Malgun Gothic",system-ui,sans-serif; }
button, input, select { font: inherit; }
.hidden { display: none !important; }
.app-shell { min-height: 100vh; padding: 20px; }
.workspace { width: min(1600px, 100%); margin: 0 auto; }
.topbar { display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:14px; }
.eyebrow { margin:0 0 2px; color:var(--accent-dark); font-size:11px; font-weight:800; letter-spacing:0.5px; text-transform:uppercase; }
h1 { margin:0; font-size:clamp(22px,3vw,36px); line-height:1.1; }
.status { min-width:100px; border:1px solid var(--line); border-radius:6px; background:var(--panel); padding:8px 12px; color:var(--muted); font-size:13px; text-align:center; }
.status.is-loading { color:#8a5a00; border-color:#f1ca7a; background:#fff9eb; }
.status.is-error { color:#a01828; border-color:#f0a8b0; background:#fff1f2; }
.control-bar { display:flex; flex-wrap:wrap; gap:10px; align-items:end; margin-bottom:14px; border:1px solid var(--line); border-radius:8px; background:var(--panel); padding:12px; box-shadow:var(--shadow); }
.control-bar label { display:grid; gap:4px; color:var(--muted); font-size:12px; font-weight:700; min-width:100px; flex:1; }
.control-bar input, .control-bar select { width:100%; min-height:38px; border:1px solid #c9d2e1; border-radius:5px; background:#fff; color:var(--ink); padding:0 10px; }
.btn-primary { min-height:38px; border:0; border-radius:5px; background:var(--accent); color:#fff; padding:0 16px; font-weight:700; cursor:pointer; }
.btn-primary:hover { background:var(--accent-dark); }
.btn-secondary { min-height:38px; border:1px solid var(--line); border-radius:5px; background:var(--panel); color:var(--ink); padding:0 14px; font-weight:600; cursor:pointer; }
.btn-secondary:hover { background:var(--bg); }
.btn-small { height:32px; border:1px solid var(--line); border-radius:4px; background:var(--panel); color:var(--ink); padding:0 12px; font-size:13px; font-weight:600; cursor:pointer; }
.score-board { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:14px; }
.score-composite { display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:160px; padding:14px 20px; border:2px solid var(--line); border-radius:8px; background:var(--panel); box-shadow:var(--shadow); }
.score-label { font-size:12px; font-weight:700; color:var(--muted); margin-bottom:4px; }
.score-value { font-size:28px; font-weight:800; line-height:1.2; }
.score-rubric { font-size:14px; font-weight:700; margin-top:2px; padding:2px 10px; border-radius:4px; }
.rubric-strong-oversold { color:#fff; background:#1f6feb; }
.rubric-oversold { color:#fff; background:#2d9cdb; }
.rubric-neutral { color:#fff; background:#6b7280; }
.rubric-overbought { color:#fff; background:#ef8f22; }
.rubric-strong-overbought { color:#fff; background:#d33f49; }
.score-individuals { display:flex; flex-wrap:wrap; gap:8px; flex:1; }
.score-card { display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:110px; padding:10px 14px; border:1px solid var(--line); border-radius:6px; background:var(--panel); box-shadow:var(--shadow); flex:1; }
.score-card-name { font-size:11px; font-weight:700; color:var(--muted); }
.score-card-value { font-size:20px; font-weight:800; margin:2px 0; }
.score-card-rubric { font-size:10px; font-weight:600; padding:1px 6px; border-radius:3px; }
.score-card-weight { font-size:10px; color:var(--muted); }
.chart-stage { position:relative; border:1px solid var(--line); border-radius:8px; background:var(--panel); box-shadow:var(--shadow); overflow:hidden; min-height:400px; }
#chart { width:100%; }
.empty-state { display:grid; place-items:center; min-height:400px; color:var(--muted); font-weight:700; }
.empty-state.hidden-state { display:none; }
.readout { min-height:40px; margin-top:10px; border:1px solid var(--line); border-radius:6px; background:var(--panel); padding:10px 12px; color:var(--muted); font-size:13px; }
.modal { position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; }
.modal-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.4); }
.modal-content { position:relative; z-index:1; width:min(720px,95vw); max-height:90vh; background:var(--panel); border-radius:10px; box-shadow:0 20px 60px rgba(0,0,0,0.2); display:flex; flex-direction:column; }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line); }
.modal-header h2 { margin:0; font-size:18px; }
.modal-close { width:32px; height:32px; border:0; border-radius:6px; background:none; color:var(--muted); font-size:22px; cursor:pointer; display:grid; place-items:center; }
.modal-body { padding:16px 20px; overflow-y:auto; flex:1; }
.modal-footer { display:flex; gap:8px; justify-content:flex-end; padding:12px 20px; border-top:1px solid var(--line); }
.settings-toolbar { display:flex; gap:8px; margin-bottom:14px; }
.indicator-settings { border:1px solid var(--line); border-radius:6px; margin-bottom:10px; overflow:hidden; }
.indicator-header { display:flex; align-items:center; gap:10px; padding:10px 14px; background:#f8fafc; }
.indicator-toggle { width:18px; height:18px; accent-color:var(--accent); cursor:pointer; }
.indicator-name { font-weight:700; font-size:14px; flex:1; }
.indicator-category { font-size:11px; font-weight:600; padding:2px 8px; border-radius:3px; background:#e8f0fe; color:var(--accent-dark); }
.indicator-help-btn { border:0; background:none; color:var(--accent); font-size:13px; font-weight:700; cursor:pointer; }
.indicator-params { padding:10px 14px; border-top:1px solid var(--line); display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; }
.param-group { display:grid; gap:3px; }
.param-group label { font-size:11px; font-weight:600; color:var(--muted); }
.param-group input { width:100%; height:32px; border:1px solid #c9d2e1; border-radius:4px; padding:0 8px; font-size:13px; }
.weight-row { display:flex; align-items:center; gap:10px; padding:8px 14px; border-top:1px solid var(--line); background:#fafbfc; }
.weight-row label { font-size:12px; font-weight:600; color:var(--muted); white-space:nowrap; }
.weight-row input[type="range"] { flex:1; accent-color:var(--accent); }
.weight-row .weight-display { min-width:40px; font-size:13px; font-weight:700; text-align:right; }
.help-section { margin-bottom:16px; }
.help-section h3 { margin:0 0 6px; font-size:15px; color:var(--accent-dark); }
.help-section p { margin:0 0 4px; font-size:14px; line-height:1.6; }
.help-section .formula { background:#f0f4f8; padding:8px 12px; border-radius:4px; font-family:monospace; font-size:13px; margin:6px 0; }
.help-list-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); cursor:pointer; }
.help-list-item:hover { background:#f8fafc; margin:0 -20px; padding:10px 20px; }
.help-list-name { font-weight:700; flex:1; }
.help-list-cat { font-size:12px; color:var(--accent); }
@media (max-width:800px) {
  .app-shell { padding:12px; }
  .topbar { flex-direction:column; align-items:stretch; }
  .control-bar { flex-direction:column; }
  .score-board { flex-direction:column; }
}
</style>
