<script>
'use strict';

// ============================================================
// INDICATOR CALCULATION FUNCTIONS
// ============================================================

function calcSMA(values, period) {
  var result = new Array(values.length).fill(null);
  var sum = 0;
  for (var i = 0; i < values.length; i++) {
    sum += values[i];
    if (i >= period) sum -= values[i - period];
    if (i >= period - 1) result[i] = sum / period;
  }
  return result;
}

function calcEMA(values, period) {
  var result = new Array(values.length).fill(null);
  var k = 2 / (period + 1);
  var prev = null;
  for (var i = 0; i < values.length; i++) {
    if (values[i] === null || values[i] === undefined) continue;
    prev = prev === null ? values[i] : values[i] * k + prev * (1 - k);
    result[i] = prev;
  }
  return result;
}

function calcRSI(closes, period) {
  var result = new Array(closes.length).fill(null);
  if (closes.length < period + 1) return result;
  var gainSum = 0, lossSum = 0;
  for (var i = 1; i <= period; i++) {
    var diff = closes[i] - closes[i - 1];
    if (diff >= 0) gainSum += diff; else lossSum -= diff;
  }
  var avgGain = gainSum / period;
  var avgLoss = lossSum / period;
  result[period] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  for (var i = period + 1; i < closes.length; i++) {
    var diff = closes[i] - closes[i - 1];
    avgGain = (avgGain * (period - 1) + Math.max(diff, 0)) / period;
    avgLoss = (avgLoss * (period - 1) + Math.max(-diff, 0)) / period;
    result[i] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  }
  return result;
}

function calcMACD(closes, fast, slow, signalPeriod) {
  var fastEma = calcEMA(closes, fast);
  var slowEma = calcEMA(closes, slow);
  var line = closes.map(function (_, i) {
    return fastEma[i] !== null && slowEma[i] !== null ? fastEma[i] - slowEma[i] : null;
  });
  var signal = calcEMA(line, signalPeriod);
  var histogram = line.map(function (v, i) {
    return v !== null && signal[i] !== null ? v - signal[i] : null;
  });
  return { line: line, signal: signal, histogram: histogram };
}

function calcBollinger(closes, period, multiplier) {
  var mid = calcSMA(closes, period);
  var upper = new Array(closes.length).fill(null);
  var lower = new Array(closes.length).fill(null);
  var pctB = new Array(closes.length).fill(null);
  for (var i = period - 1; i < closes.length; i++) {
    var slice = closes.slice(i - period + 1, i + 1);
    var avg = mid[i], variance = 0;
    for (var j = 0; j < slice.length; j++) variance += Math.pow(slice[j] - avg, 2);
    var sd = Math.sqrt(variance / period);
    upper[i] = avg + multiplier * sd;
    lower[i] = avg - multiplier * sd;
    var bw = upper[i] - lower[i];
    pctB[i] = bw > 0 ? (closes[i] - lower[i]) / bw : 0.5;
  }
  return { mid: mid, upper: upper, lower: lower, pctB: pctB };
}

function calcStochastic(highs, lows, closes, kPeriod, kSmooth, dSmooth) {
  var rawK = new Array(closes.length).fill(null);
  for (var i = kPeriod - 1; i < closes.length; i++) {
    var hh = -Infinity, ll = Infinity;
    for (var j = i - kPeriod + 1; j <= i; j++) {
      if (highs[j] > hh) hh = highs[j];
      if (lows[j] < ll) ll = lows[j];
    }
    rawK[i] = hh === ll ? 50 : ((closes[i] - ll) / (hh - ll)) * 100;
  }
  var k = calcSMA(rawK.map(function (v) { return v === null ? 0 : v; }), kSmooth);
  for (var i = 0; i < kPeriod - 1 + kSmooth - 1; i++) k[i] = null;
  var d = calcSMA(k.map(function (v) { return v === null ? 0 : v; }), dSmooth);
  for (var i = 0; i < kPeriod - 1 + kSmooth - 1 + dSmooth - 1; i++) d[i] = null;
  return { k: k, d: d };
}

function calcWilliamsR(highs, lows, closes, period) {
  var result = new Array(closes.length).fill(null);
  for (var i = period - 1; i < closes.length; i++) {
    var hh = -Infinity, ll = Infinity;
    for (var j = i - period + 1; j <= i; j++) {
      if (highs[j] > hh) hh = highs[j];
      if (lows[j] < ll) ll = lows[j];
    }
    result[i] = hh === ll ? -50 : ((hh - closes[i]) / (hh - ll)) * -100;
  }
  return result;
}

function calcATR(highs, lows, closes, period) {
  var tr = new Array(closes.length).fill(null);
  tr[0] = highs[0] - lows[0];
  for (var i = 1; i < closes.length; i++) {
    tr[i] = Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i - 1]), Math.abs(lows[i] - closes[i - 1]));
  }
  var result = new Array(closes.length).fill(null);
  var sum = 0;
  for (var i = 0; i < closes.length; i++) {
    sum += tr[i];
    if (i >= period) sum -= tr[i - period];
    if (i >= period - 1) result[i] = sum / period;
  }
  return result;
}

function calcCCI(highs, lows, closes, period) {
  var tp = closes.map(function (c, i) { return (highs[i] + lows[i] + c) / 3; });
  var result = new Array(closes.length).fill(null);
  for (var i = period - 1; i < closes.length; i++) {
    var slice = tp.slice(i - period + 1, i + 1);
    var avg = slice.reduce(function (a, b) { return a + b; }, 0) / period;
    var md = slice.reduce(function (a, v) { return a + Math.abs(v - avg); }, 0) / period;
    result[i] = md === 0 ? 0 : (tp[i] - avg) / (0.015 * md);
  }
  return result;
}

function calcOBV(closes, volumes) {
  var result = new Array(closes.length).fill(null);
  result[0] = volumes[0] || 0;
  for (var i = 1; i < closes.length; i++) {
    if (closes[i] > closes[i - 1]) result[i] = result[i - 1] + (volumes[i] || 0);
    else if (closes[i] < closes[i - 1]) result[i] = result[i - 1] - (volumes[i] || 0);
    else result[i] = result[i - 1];
  }
  return result;
}

var INDICATORS = {

      meaning: '가격이 이동평균선 위에 있으면 상승 추세, 아래에 있으면 하락 추세로 판단합니다.',
      usage: '단기선이 장기선을 상향 돌파하면 골든크로스(매수 신호), 하향 돌파하면 데드크로스(매도 신호)입니다.'
    },
    calculate: function (data, params) {
      return { short: calcSMA(data.closes, params.short), mid: calcSMA(data.closes, params.mid), long: calcSMA(data.closes, params.long) };
    },

      var i = data.closes.length - 1, c = data.closes[i], s = 50;

      formula: 'CCI = (TP - SMA(TP)) / (0.015 × 평균편차), TP = (고가+저가+종가)/3',
      meaning: '+100 초과는 과매수, -100 미만은 과매도로 해석합니다.',
      usage: '-100 아래에서 위로 돌파하면 매수, +100 위에서 아래로 돌파하면 매도 신호입니다.'
    },
    calculate: function (data, params) { return { values: calcCCI(data.highs, data.lows, data.closes, params.period) }; },
    score: function (data, result) { var v = result.values[data.closes.length - 1]; return v === null ? 50 : Math.max(0, Math.min(100, 50 + (v / 200) * 50)); },
    traces: function (dates, result, params, yaxis) {
      return [{ x: dates, y: result.values, type: 'scatter', mode: 'lines', name: 'CCI(' + params.period + ')', line: { color: '#059669', width: 1.5 }, yaxis: yaxis }];
    },
    shapes: function (params, yaxis) {
      var ya = yaxis.replace('y', 'y');
      return [
        { type: 'line', x0: 0, x1: 1, xref: 'paper', y0: params.overbought, y1: params.overbought, yref: ya, line: { color: '#d33f49', width: 1, dash: 'dash' } },
        { type: 'line', x0: 0, x1: 1, xref: 'paper', y0: params.oversold, y1: params.oversold, yref: ya, line: { color: '#1f6feb', width: 1, dash: 'dash' } },
        { type: 'line', x0: 0, x1: 1, xref: 'paper', y0: 0, y1: 0, yref: ya, line: { color: '#9ca3af', width: 0.5, dash: 'dot' } }
      ];
    }
  },
  obv: {
    id: 'obv', name: 'OBV', category: '거래량', overlay: false, scorable: false,
    defaultParams: { signalPeriod: 20 },
    paramLabels: { signalPeriod: '시그널 기간' },
    help: {
      summary: '가격 변동 방향에 따라 거래량을 누적하여 매집·분산을 파악합니다.',
      formula: '상승일: OBV += 거래량, 하락일: OBV -= 거래량',
      meaning: 'OBV 상승은 매집, 하락은 분산을 의미합니다.',
      usage: '가격은 횡보하는데 OBV가 상승하면 조만간 가격 상승이 예상됩니다.'
    },
    calculate: function (data, params) {
      var obv = calcOBV(data.closes, data.volumes);
      return { values: obv, signal: calcSMA(obv, params.signalPeriod) };
    },
    score: function () { return 50; },
    traces: function (dates, result, params, yaxis) {
      return [
        { x: dates, y: result.values, type: 'scatter', mode: 'lines', name: 'OBV', line: { color: '#6366f1', width: 1.5 }, yaxis: yaxis },
        { x: dates, y: result.signal, type: 'scatter', mode: 'lines', name: 'OBV Signal', line: { color: '#f97316', width: 1.2, dash: 'dash' }, yaxis: yaxis }
      ];
    }
  }
};

function getRubric(score) {
  if (score <= 20) return { text: '강한 과매도', css: 'rubric-strong-oversold' };
  if (score <= 40) return { text: '과매도', css: 'rubric-oversold' };
  if (score <= 60) return { text: '중립', css: 'rubric-neutral' };
  if (score <= 80) return { text: '과매수', css: 'rubric-overbought' };
  return { text: '강한 과매수', css: 'rubric-strong-overbought' };
}

function getRubricColor(score) {
  if (score <= 20) return '#1f6feb';
  if (score <= 40) return '#2d9cdb';
  if (score <= 60) return '#6b7280';
  if (score <= 80) return '#ef8f22';
  return '#d33f49';
}

var state = { data: null, settings: null, results: {}, scores: {} };

function getDefaultSettings() {
  var settings = {};
  var enabledByDefault = ['sma', 'rsi', 'macd', 'bollinger', 'stochastic'];
  var ids = Object.keys(INDICATORS);
  var enabledCount = enabledByDefault.length;
  var defaultWeight = Math.round((100 / enabledCount) * 100) / 100;
  ids.forEach(function (id) {
    var ind = INDICATORS[id];
    settings[id] = {
      enabled: enabledByDefault.indexOf(id) !== -1,
      weight: enabledByDefault.indexOf(id) !== -1 ? defaultWeight : 0,
      params: JSON.parse(JSON.stringify(ind.defaultParams))
    };
  });
  return settings;
}

function loadSettingsFromServer() {
  google.script.run
    .withSuccessHandler(function (saved) {
      if (saved) {
        var defaults = getDefaultSettings();
        Object.keys(defaults).forEach(function (id) {
          if (!saved[id]) saved[id] = defaults[id];
        });
        state.settings = saved;
      } else {
        state.settings = getDefaultSettings();
      }
    })
    .withFailureHandler(function () {
      state.settings = getDefaultSettings();
    })
    .loadUserSettings();
}

function saveSettingsToServer(settings) {
  google.script.run
    .withFailureHandler(function (e) { console.error('설정 저장 실패:', e); })
    .saveUserSettings(settings);
}

function equalizeWeights() {
  var settings = collectSettingsFromUI();
  var enabledIds = Object.keys(settings).filter(function (id) { return settings[id].enabled && INDICATORS[id] && INDICATORS[id].scorable; });
  var w = enabledIds.length > 0 ? Math.round((100 / enabledIds.length) * 100) / 100 : 0;
  Object.keys(settings).forEach(function (id) { settings[id].weight = enabledIds.indexOf(id) !== -1 ? w : 0; });
  renderSettingsContent(settings);
}

function resetAllSettings() { renderSettingsContent(getDefaultSettings()); }

function setStatus(text, type) {
  var el = document.getElementById('status');
  el.textContent = text;
  el.classList.toggle('is-loading', type === 'loading');
  el.classList.toggle('is-error', type === 'error');
}

function toNumber(value) {
  var n = Number(String(value == null ? '' : value).replace(/,/g, ''));
  return Number.isFinite(n) ? n : null;
}

function formatDate(raw) {
  var s = String(raw || '');
  if (/^\d{8}$/.test(s)) return s.slice(0, 4) + '-' + s.slice(4, 6) + '-' + s.slice(6, 8);
  if (/^\d{12,14}$/.test(s)) return s.slice(0, 4) + '-' + s.slice(4, 6) + '-' + s.slice(6, 8);
  return s || '-';
}

function normalizeData(payload) {
  var rows = payload && (payload.ResultData || payload.resultData || payload.data || payload.items || payload.result || []);
  if (!Array.isArray(rows)) { if (Array.isArray(payload)) rows = payload; else return []; }
  return rows.map(function (row) {
    var dateRaw = String(row.bzDd || row.date || row.trdDd || row.time || row.datetime || row.dt || '');
    return {
      dateRaw: dateRaw, date: formatDate(dateRaw),
      open: toNumber(row.opnPrc || row.open || row.o),
      high: toNumber(row.hgPrc || row.high || row.h),
      low: toNumber(row.lwPrc || row.low || row.l),
      close: toNumber(row.trdPrc || row.close || row.c),
      volume: toNumber(row.accTrdvol || row.volume || row.v)
    };
  }).filter(function (r) {
    return r.dateRaw && r.open !== null && r.high !== null && r.low !== null && r.close !== null;
  }).sort(function (a, b) { return a.dateRaw.localeCompare(b.dateRaw); });
}

function loadData() {
  var params = {
    market: document.getElementById('market').value,
    code: document.getElementById('code').value.trim(),
    period: document.getElementById('period').value,
    limit: Number(document.getElementById('limit').value) || 200
  };

  setStatus('불러오는 중...', 'loading');

  google.script.run
    .withSuccessHandler(function (payload) {
      var data = normalizeData(payload);
      if (data.length === 0) {
        setStatus('오류', 'error');
        document.getElementById('readout').textContent = '조회된 데이터가 없습니다.';
        return;
      }
      state.data = data;
      setStatus(data.length + '개 로드됨');
      runAnalysis();
    })
    .withFailureHandler(function (err) {
      setStatus('오류', 'error');
      document.getElementById('readout').textContent = err.message || '데이터를 불러오지 못했습니다.';
    })
    .fetchStockHistory(params);
}

// ANALYSIS
// ============================================================

function runIndicators(data, settings) {
  var results = {}, scores = {};
  var indicatorData = {
    dates: data.map(function (r) { return r.date; }),
    opens: data.map(function (r) { return r.open; }),
    highs: data.map(function (r) { return r.high; }),
    lows: data.map(function (r) { return r.low; }),
    closes: data.map(function (r) { return r.close; }),
    volumes: data.map(function (r) { return r.volume || 0; })
  };
  Object.keys(INDICATORS).forEach(function (id) {
    if (!settings[id] || !settings[id].enabled) return;
    var ind = INDICATORS[id];
    try {
      results[id] = ind.calculate(indicatorData, settings[id].params);
      if (ind.scorable) scores[id] = ind.score(indicatorData, results[id], settings[id].params);
    } catch (e) { console.error('Indicator error:', id, e); }
  });
  return { results: results, scores: scores };
}

function calculateCompositeScore(scores, settings) {
  var totalWeight = 0, weightedSum = 0;
  Object.keys(scores).forEach(function (id) {
    var w = settings[id] ? settings[id].weight : 0;
    weightedSum += scores[id] * w;
    totalWeight += w;
  });
  return totalWeight > 0 ? weightedSum / totalWeight : 50;
}

function runAnalysis() {
  if (!state.data || !state.settings) return;
  var result = runIndicators(state.data, state.settings);
  state.results = result.results;
  state.scores = result.scores;
  renderChart(state.data, state.results, state.settings);
  if (Object.keys(state.scores).length > 0) renderScoreBoard(state.scores, state.settings);
}

// ============================================================
// CHART
// ============================================================

function buildChart(data, results, settings) {
  var dates = data.map(function (r) { return r.date; });
  var opens = data.map(function (r) { return r.open; });
  var highs = data.map(function (r) { return r.high; });
  var lows = data.map(function (r) { return r.low; });
  var closes = data.map(function (r) { return r.close; });
  var volumes = data.map(function (r) { return r.volume || 0; });

  var separatePanels = [];
  Object.keys(INDICATORS).forEach(function (id) {
    if (settings[id] && settings[id].enabled && !INDICATORS[id].overlay) separatePanels.push(id);
  });

  var totalPanels = 2 + separatePanels.length;
  var gap = 0.025, totalGap = gap * (totalPanels - 1), available = 1.0 - totalGap;
  var priceRatio = 0.40, volumeRatio = 0.08;
  var remainingRatio = 1.0 - priceRatio - volumeRatio;
  var indicatorRatio = separatePanels.length > 0 ? remainingRatio / separatePanels.length : 0;

  var panelDomains = {}, top = 1.0;
  var ph = priceRatio * available;
  panelDomains.price = [top - ph, top]; top -= ph + gap;
  var vh = volumeRatio * available;
  panelDomains.volume = [top - vh, top]; top -= vh + gap;
  separatePanels.forEach(function (id) {
    var ih = indicatorRatio * available;
    panelDomains[id] = [top - ih, top]; top -= ih + gap;
  });

  var traces = [], shapes = [];
  var volColors = closes.map(function (c, i) { return i === 0 ? 'rgba(107,114,128,0.5)' : (c >= closes[i - 1] ? 'rgba(211,63,73,0.5)' : 'rgba(36,116,198,0.5)'); });

  traces.push({
    x: dates, open: opens, high: highs, low: lows, close: closes, type: 'candlestick', name: '가격',
    increasing: { line: { color: '#d33f49' } }, decreasing: { line: { color: '#2474c6' } }, yaxis: 'y'
  });
  traces.push({ x: dates, y: volumes, type: 'bar', name: '거래량', marker: { color: volColors }, yaxis: 'y2' });

  var axisMap = { price: 'y', volume: 'y2' }, axisNum = 3;
  separatePanels.forEach(function (id) { axisMap[id] = 'y' + axisNum; axisNum++; });

  Object.keys(results).forEach(function (id) {
    var ind = INDICATORS[id], params = settings[id].params;
    var yaxis = ind.overlay ? 'y' : axisMap[id];
    if (!yaxis) return;
    traces = traces.concat(ind.traces(dates, results[id], params, yaxis));
    if (ind.shapes) shapes = shapes.concat(ind.shapes(params, yaxis));
  });

  var chartHeight = Math.max(600, 400 + separatePanels.length * 130);
  var panelTitles = { rsi: 'RSI', macd: 'MACD', stochastic: 'Stochastic', williamsR: 'Williams %R', atr: 'ATR', cci: 'CCI', obv: 'OBV' };

  var layout = {
    height: chartHeight, showlegend: true, legend: { orientation: 'h', y: -0.06, font: { size: 10 } },
    hovermode: 'x unified', margin: { l: 55, r: 15, t: 25, b: 50 },
    xaxis: { rangeslider: { visible: false }, showspikes: true, spikemode: 'across', spikethickness: 1, spikecolor: '#999', spikedash: 'dot' },
    shapes: shapes, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
    yaxis: { domain: panelDomains.price, title: { text: '가격', font: { size: 11 } }, gridcolor: '#eef1f6', tickformat: ',' },
    yaxis2: { domain: panelDomains.volume, title: { text: '거래량', font: { size: 10 } }, gridcolor: '#eef1f6', tickformat: '.2s' }
  };

  axisNum = 3;
  separatePanels.forEach(function (id) {
    var key = 'yaxis' + axisNum;
    layout[key] = { domain: panelDomains[id], title: { text: panelTitles[id] || id, font: { size: 10 } }, gridcolor: '#eef1f6' };
    if (id === 'rsi' || id === 'stochastic') layout[key].range = [0, 100];
    else if (id === 'williamsR') layout[key].range = [-100, 0];
    axisNum++;
  });

  return { traces: traces, layout: layout };
}

function renderChart(data, results, settings) {
  var chartDiv = document.getElementById('chart');
  var emptyState = document.getElementById('emptyState');
  if (!data || data.length === 0) { chartDiv.innerHTML = ''; emptyState.classList.remove('hidden-state'); return; }
  emptyState.classList.add('hidden-state');
  var chart = buildChart(data, results, settings);
  Plotly.newPlot(chartDiv, chart.traces, chart.layout, { responsive: true, displayModeBar: true, displaylogo: false });

  chartDiv.on('plotly_hover', function (eventData) {
    if (!eventData || !eventData.points || !eventData.points.length) return;
    var idx = eventData.points[0].pointIndex || eventData.points[0].pointNumber;
    if (idx === undefined || !data[idx]) return;
    updateReadout(data, results, settings, idx);
  });
  chartDiv.on('plotly_unhover', function () {
    document.getElementById('readout').textContent = '마우스를 차트 위에 올리면 해당 시점의 값이 표시됩니다.';
  });
}

function updateReadout(data, results, settings, idx) {
  var row = data[idx];
  if (!row) return;
  var parts = [row.date, '시가 ' + Number(row.open).toLocaleString(), '고가 ' + Number(row.high).toLocaleString(), '저가 ' + Number(row.low).toLocaleString(), '종가 ' + Number(row.close).toLocaleString(), '거래량 ' + Number(row.volume || 0).toLocaleString()];
  Object.keys(results).forEach(function (id) {
    var r = results[id];
    if (id === 'rsi' && r.values && r.values[idx] !== null) parts.push('RSI ' + r.values[idx].toFixed(1));
    else if (id === 'macd' && r.histogram && r.histogram[idx] !== null) parts.push('MACD ' + r.line[idx].toFixed(2));
    else if (id === 'bollinger' && r.pctB && r.pctB[idx] !== null) parts.push('%B ' + (r.pctB[idx] * 100).toFixed(1));
    else if (id === 'stochastic' && r.k && r.k[idx] !== null) parts.push('%K ' + r.k[idx].toFixed(1));
    else if (id === 'williamsR' && r.values && r.values[idx] !== null) parts.push('%R ' + r.values[idx].toFixed(1));
    else if (id === 'cci' && r.values && r.values[idx] !== null) parts.push('CCI ' + r.values[idx].toFixed(1));
  });
  document.getElementById('readout').textContent = parts.join(' · ');
}

function renderScoreBoard(scores, settings) {
  var board = document.getElementById('scoreBoard');
  var composite = calculateCompositeScore(scores, settings);
  var rubric = getRubric(composite);
  document.getElementById('compositeScore').textContent = composite.toFixed(1);
  document.getElementById('compositeScore').style.color = getRubricColor(composite);
  var re = document.getElementById('compositeRubric');
  re.textContent = rubric.text; re.className = 'score-rubric ' + rubric.css;

  var html = '';
  Object.keys(scores).forEach(function (id) {
    var ind = INDICATORS[id], s = scores[id], r = getRubric(s), w = settings[id] ? settings[id].weight : 0;
    html += '<div class="score-card"><div class="score-card-name">' + ind.name + '</div><div class="score-card-value" style="color:' + getRubricColor(s) + '">' + s.toFixed(1) + '</div><div class="score-card-rubric ' + r.css + '">' + r.text + '</div><div class="score-card-weight">가중치 ' + w.toFixed(1) + '%</div></div>';
  });
  document.getElementById('individualScores').innerHTML = html;
  board.classList.remove('hidden');
}

function renderSettingsContent(settings) {
  var html = '';
  Object.keys(INDICATORS).forEach(function (id) {
    var ind = INDICATORS[id];
    var cfg = settings[id] || { enabled: false, weight: 0, params: JSON.parse(JSON.stringify(ind.defaultParams)) };
    html += '<div class="indicator-settings" data-id="' + id + '"><div class="indicator-header"><input type="checkbox" class="indicator-toggle" data-id="' + id + '" ' + (cfg.enabled ? 'checked' : '') + ' /><span class="indicator-name">' + ind.name + '</span><span class="indicator-category">' + ind.category + '</span><button type="button" class="indicator-help-btn" onclick="showHelp(\'' + id + '\')">?</button></div>';
    html += '<div class="indicator-params">';
    Object.keys(ind.defaultParams).forEach(function (p) {
      html += '<div class="param-group"><label>' + (ind.paramLabels[p] || p) + '</label><input type="number" data-id="' + id + '" data-param="' + p + '" value="' + (cfg.params[p] !== undefined ? cfg.params[p] : ind.defaultParams[p]) + '" step="any" /></div>';
    });
    html += '</div>';
    if (ind.scorable) {
      html += '<div class="weight-row"><label>가중치</label><input type="range" min="0" max="100" step="0.1" value="' + cfg.weight + '" data-id="' + id + '" data-weight="true" oninput="this.nextElementSibling.textContent=Number(this.value).toFixed(1)+\'%\'" /><span class="weight-display">' + cfg.weight.toFixed(1) + '%</span></div>';
    }
    html += '</div>';
  });
  document.getElementById('settingsContent').innerHTML = html;
}

function collectSettingsFromUI() {
  var settings = {};
  document.querySelectorAll('.indicator-toggle').forEach(function (el) {
    settings[el.getAttribute('data-id')] = { enabled: el.checked, weight: 0, params: {} };
  });
  document.querySelectorAll('.indicator-params input[data-param]').forEach(function (el) {
    var id = el.getAttribute('data-id');
    if (settings[id]) settings[id].params[el.getAttribute('data-param')] = Number(el.value);
  });
  document.querySelectorAll('input[data-weight]').forEach(function (el) {
    var id = el.getAttribute('data-id');
    if (settings[id]) settings[id].weight = Number(el.value);
  });
  Object.keys(INDICATORS).forEach(function (id) {
    if (!settings[id]) settings[id] = { enabled: false, weight: 0, params: JSON.parse(JSON.stringify(INDICATORS[id].defaultParams)) };
  });
  return settings;
}

function openSettings() {
  renderSettingsContent(state.settings);
  document.getElementById('settingsModal').classList.remove('hidden');
}

function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

function applySettings() {
  var settings = collectSettingsFromUI();
  state.settings = settings;
  saveSettingsToServer(settings);
  closeSettings();
  if (state.data && state.data.length > 0) runAnalysis();
}

    html += '</table></div>';
  }
  document.getElementById('helpBody').innerHTML = html;
  document.getElementById('helpModal').classList.remove('hidden');
}

function closeHelp() { document.getElementById('helpModal').classList.add('hidden'); }

function openHelpList() {
  document.getElementById('helpTitle').textContent = '기술적분석 지표 도움말';
  var html = '';
  Object.keys(INDICATORS).forEach(function (id) {
    var ind = INDICATORS[id];
    html += '<div class="help-list-item" onclick="closeHelp();showHelp(\'' + id + '\')"><span class="help-list-name">' + ind.name + '</span><span class="help-list-cat">' + ind.category + '</span></div>';
  });
  document.getElementById('helpBody').innerHTML = html;
  document.getElementById('helpModal').classList.remove('hidden');
}

document.getElementById('market').addEventListener('change', function () {
  var codeInput = document.getElementById('code');
  if (this.value === 'kospi' || this.value === 'kosdaq') { codeInput.value = '000660'; }
  else { codeInput.value = 'AAPL'; }
});

(function init() {
  state.settings = getDefaultSettings();
  loadSettingsFromServer();
})();
</script>
