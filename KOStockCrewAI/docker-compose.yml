# KOStockCrewAI docker-compose
# postgres + api 두 개의 서비스로 구성됩니다.
version: "3.9"

services:
  # ---------- PostgreSQL 데이터베이스 ----------
  postgres:
    image: postgres:16
    container_name: kostockcrewai_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kostockcrewai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- FastAPI 애플리케이션 ----------
  api:
    build: .
    container_name: kostockcrewai_api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # 컨테이너 내부에서는 host 가 'localhost' 가 아니라 'postgres' 입니다.
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/kostockcrewai
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  pgdata:
